<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8"> 
    <style>
        body { width: 300px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f9f9f9; }
        h3 { color: #333; }
        input { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        button { background: #d97757; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #bf5f41; }
        .note { font-size: 12px; color: #666; margin-bottom: 15px; line-height: 1.4; }
    </style>
</head>
<body>
    <h3>إعدادات Gemini AI 🔑</h3>
    <p class="note">ضع مفتاح الـ API الخاص بك لتفعيل الضغط الذكي (Gemini 1.5 Flash)</p>
    <input type="password" id="api-key" placeholder="AIzaSy...">
    <br>
    <button id="save-btn">حفظ المفتاح</button>
    <script src="popup.js"></script>
</body>
</html>
